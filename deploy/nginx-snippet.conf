# Этот файл — НЕ полный конфиг Nginx, а блоки, которые нужно вставить
# в твой существующий server-блок для loweffort.site (тот, что уже
# настроен Let's Encrypt'ом, обычно лежит в /etc/nginx/sites-enabled/).
#
# После правки: sudo nginx -t && sudo systemctl reload nginx

# ─── Раздача собранного фронтенда ──────────────────────────────
# Замени дефолтный location / на этот:
location / {
    root /home/deploy/loweffort/frontend/dist;
    try_files $uri $uri/ /index.html;
}

# ─── Прокси на Fastify (REST API) ──────────────────────────────
location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── Прокси на Socket.io (WebSocket upgrade) ───────────────────
location /socket.io/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;  # длинноживущие WS соединения
}

# ─── Кэш статики Vite (хэши в именах файлов) ───────────────────
location /assets/ {
    root /home/deploy/loweffort/frontend/dist;
    expires 1y;
    add_header Cache-Control "public, immutable";
}
